# ============================================================
#  Finance Dashboard - Application Configuration
# ============================================================

# Server configuration
server.port=8080
server.servlet.context-path=/api

# ============================================================
# MySQL Database Configuration
# ============================================================
# IMPORTANT: Update the password below to match your MySQL root password
# If your MySQL has no password, leave it blank (password=)
spring.datasource.url=jdbc:mysql://localhost:3306/finance_dashboard?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Krishna
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Disable Spring Boot's SQL initialiser — Hibernate manages schema via ddl-auto
# (prevents schema.sql in resources from conflicting with ddl-auto=update)
spring.sql.init.mode=never

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' creates/alters tables automatically — safe for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Prevent Hibernate from initialising schema — we use ddl-auto
spring.jpa.defer-datasource-initialization=false

# ============================================================
# JWT Configuration
# ============================================================
# Strong Base64-encoded 256-bit secret for HS256 signing
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration.ms=86400000

# ============================================================
# SpringDoc / Swagger UI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================================
# Actuator (Health Check)
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ============================================================
# Logging Configuration
# ============================================================
logging.level.com.financeapp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
