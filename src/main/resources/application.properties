# ============================================================
#  Finance Dashboard - Application Configuration
# ============================================================

# Server configuration
server.port=8080
server.servlet.context-path=/api

# ============================================================
# H2 Database Configuration (embedded, file-backed)
# ============================================================
# Data is stored under ./data/ relative to the working directory (survives restarts).
# Optional: set H2_PASSWORD for the sa user; leave unset for empty password (default H2).
spring.datasource.url=jdbc:h2:file:./data/finance_dashboard;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver

# Disable Spring Boot's SQL initialiser — Hibernate manages schema via ddl-auto
# (prevents schema.sql in resources from conflicting with ddl-auto=update)
spring.sql.init.mode=never

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' creates/alters tables automatically — safe for development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Prevent Hibernate from initialising schema — we use ddl-auto
spring.jpa.defer-datasource-initialization=false

# ============================================================
# JWT Configuration
# ============================================================
# Strong Base64-encoded 256-bit secret for HS256 signing
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration.ms=86400000

# ============================================================
# SpringDoc / Swagger UI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================================
# Actuator (Health Check)
# ============================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ============================================================
# Logging Configuration
# ============================================================
logging.level.com.financeapp=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
